extends: ../base.yaml

# Search space from paper Table 6.
# Use these values with repeated runs (3 seeds) to reproduce statistics.
search_space:
  learning_rate: [0.001, 0.01, 0.1, 0.3, 0.5, 1.25]
  parameter_scaling: [true, false]
  batch_size: [32, 64, 128, 256, 512]
  max_steps: [10000, 20000, 30000]
  warmup_steps: [0, 4000, 6000, 8000]
  decay_factor: [null, 0.1, 0.5]
  steps_per_decay: [null, 4000, 6000, 8000]

repro_stats:
  prompt_tuning_trials: 40
  model_tuning_trials: 37
  seeds_per_setting: 3
  main_and_ablation_runs: 195
  domain_shift_runs: 18
  ensemble_runs: 24
