project:
  name: Emotion_grpo
  workspace: .
  python_bin: /opt/data/private/lbh/emorlenv/bin/python

datasets:
  train_jsonl: data/demo/train.jsonl
  val_jsonl: data/demo/val.jsonl
  processed_train: data/demo/processed/train.parquet
  processed_val: data/demo/processed/val.parquet

reward:
  provider_cls: emotion_grpo.rewards.random_provider.RandomIntrinsicRewardProvider
  provider_kwargs:
    seed: 7
    min_value: -1.0
    max_value: 1.0
  include_details: true

verl:
  algorithm:
    adv_estimator: grpo
    use_kl_in_reward: false
    kl_ctrl:
      kl_coef: 0.001
  data:
    train_batch_size: 1
    val_batch_size: 1
    max_prompt_length: 512
    max_response_length: 256
    filter_overlong_prompts: true
    truncation: error
    shuffle: false
  actor_rollout_ref:
    model:
      enable_gradient_checkpointing: true
      lora_rank: 32
      lora_alpha: 32
      target_modules: all-linear
      use_remove_padding: true
    actor:
      optim:
        lr: 3.0e-5
      ppo_mini_batch_size: 1
      ppo_micro_batch_size_per_gpu: 1
      use_kl_loss: true
      kl_loss_coef: 0.001
      kl_loss_type: low_var_kl
      entropy_coeff: 0.001
      ulysses_sequence_parallel_size: 1
      fsdp_config:
        fsdp_size: -1
        param_offload: true
        optimizer_offload: true
    rollout:
      log_prob_micro_batch_size: 1
      tensor_model_parallel_size: 1
      name: vllm
      gpu_memory_utilization: 0.1
      n: 4
      max_num_seqs: 64
      max_num_batched_tokens: 768
      enable_chunked_prefill: false
      load_format: safetensors
      layered_summon: true
    ref:
      log_prob_micro_batch_size: 1
      fsdp_config:
        param_offload: true
  reward:
    reward_manager:
      source: register
      name: naive
  trainer:
    val_before_train: false
    critic_warmup: 0
    logger:
      - console
    nnodes: 1
    n_gpus_per_node: 1
    save_freq: 5
    test_freq: 5
    total_epochs: 1
