defaults:
  base: base
  model: qwen2_5_0_5b_instruct
  runtime: single_gpu

experiment_name: emotion_vector_qwen3_0_6b_demo

datasets:
  train_jsonl: data/vector_demo/train.jsonl
  val_jsonl: data/vector_demo/val.jsonl
  processed_train: data/vector_demo/processed/train.parquet
  processed_val: data/vector_demo/processed/val.parquet

reward:
  provider_cls: emotion_grpo.rewards.emotion_vector_provider.EmotionVectorRewardProvider
  provider_kwargs:
    __replace__: true
    artifact_root: /opt/data/private/lbh/PaperCode/anthropic/artifacts/model=qwen3-0.6b__lang=en__emotions=12__topics=8__stories=2__layer=8
    score_model_name: Qwen/Qwen3-0.6B
    layer_idx: 8
    target_field: ground_truth
    score_mode: margin
    reward_scale: 2.0
    reward_clip: 1.0
    use_neutral_pca: true
    device: cpu
    max_length: 256

verl:
  trainer:
    project_name: Emotion_grpo
    experiment_name: emotion_vector_qwen3_0_6b_demo
    default_local_dir: outputs/emotion_vector_qwen3_0_6b_demo
