defaults:
  base: base
  model: qwen2_5_0_5b_instruct
  runtime: single_gpu

experiment_name: logical_reasoning_vector_qwen3_0_6b

datasets:
  train_jsonl: data/logical_vector_prepared/logical_reasoning_train.jsonl
  val_jsonl: data/logical_vector_prepared/logical_reasoning_val.jsonl
  processed_train: data/logical_vector_prepared/processed/train.parquet
  processed_val: data/logical_vector_prepared/processed/val.parquet
  logical_qa_sources:
    prompt_style: reasoning
    train_files:
      - data/logical/AIME/train.jsonl
      - data/logical/AMC/AMC_train.jsonl
      - data/logical/Math/Math_train.jsonl
      - data/logical/gsm8k/gsm8k_train.jsonl
    val_files:
      - data/logical/AIME/test.jsonl
      - data/logical/AMC/AMC_test.jsonl
      - data/logical/Math/Math_validation.jsonl
      - data/logical/gsm8k/gsm8k_validation.jsonl

reward:
  provider_cls: emotion_grpo.rewards.logical_vector_provider.LogicalVectorRewardProvider
  provider_kwargs:
    __replace__: true
    artifact_dir: /opt/data/private/lbh/PaperCode/Emotion_grpo/artifacts/logical_vectors/qwen3_0_6b_layer8
    source_files:
      - /opt/data/private/lbh/PaperCode/Emotion_grpo/data/logical/AIME/AIME_results_Qwen3-32B_filtered.jsonl
      - /opt/data/private/lbh/PaperCode/Emotion_grpo/data/logical/AMC/AMC_results_Qwen3-32B_filtered.jsonl
      - /opt/data/private/lbh/PaperCode/Emotion_grpo/data/logical/Math/Math_results_Qwen3-32B_filtered.jsonl
      - /opt/data/private/lbh/PaperCode/Emotion_grpo/data/logical/gsm8k/gsm8k_results_Qwen3-32B_filtered.jsonl
    score_model_name: Qwen/Qwen3-0.6B
    layer_idx: 8
    token_pool_start: 8
    text_fields:
      - thinking
      - answer_content
    label_field: is_good
    score_mode: margin
    reward_scale: 2.0
    reward_clip: 1.0
    use_neutral_pca: true
    neutral_pca_variance: 0.5
    device: cpu
    max_length: 768

verl:
  trainer:
    project_name: Emotion_grpo
    experiment_name: logical_reasoning_vector_qwen3_0_6b
    default_local_dir: outputs/logical_reasoning_vector_qwen3_0_6b
