model:
  name_or_path: Qwen/Qwen3-0.6B
  tokenizer_name_or_path:
  device: auto
  trust_remote_code: true
  torch_dtype:

dataset:
  train_file: data/train.jsonl
  eval_file: data/eval.jsonl
  input_field: input
  target_field: target
  max_source_length: 256
  max_target_length: 128
  max_train_examples:
  max_eval_examples:

prompt:
  num_virtual_tokens: 20
  init_strategy: random_uniform
  prompt_path:
  emotion_vector_route: same_model
  emotion_vectors_path:
  emotion_vector_metadata_path:
  emotion_vector_projection_path:
  emotion_names: []
  emotion_vector_combination: repeat
  emotion_vector_l2_normalize: false
  random_range: 0.5
  sampled_vocab_size: 5000

training:
  seed: 13
  batch_size: 2
  eval_batch_size: 2
  learning_rate: 0.01
  weight_decay: 1.0e-5
  max_steps: 100
  eval_steps: 25
  save_steps: 25
  gradient_clip_norm: 1.0
  logging_steps: 10
  max_new_tokens: 64
  temperature: 1.0
  do_sample: false
  top_k:

output:
  output_dir: artifacts/base
  save_predictions: true
  save_metrics: true